<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emissor de Recibos - Loc Tendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo-img { max-width: 150px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card p-4">
                    <div class="text-center">
                        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-img">
                        <h4 class="mb-4">Emissão de Recibo</h4>
                    </div>

                    <form action="/gerar" method="POST">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Número</label>
                                <input type="number" name="numero" class="form-control" required placeholder="Ex: 12">
                            </div>
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Valor (R$)</label>
                                <input type="text" name="valor" class="form-control" required placeholder="Ex: 650,00">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nome do Cliente</label>
                            <input type="text" name="nome_cliente" class="form-control" required placeholder="Recebi(emos) de...">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">CPF ou CNPJ (Apenas números)</label>
                            <input type="text" name="cpf_cnpj" class="form-control" placeholder="Ex: 12345678902">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Endereço Completo</label>
                            <input type="text" name="end_cliente" class="form-control" placeholder="Rua X, Bairro Y...">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Referente a</label>
                            <input type="text" name="motivo" class="form-control" required placeholder="Ex: Aluguel de Tendas">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-outline-primary py-2 fw-bold">
                                ⬇️ APENAS BAIXAR PDF
                            </button>
                            
                            <button type="button" id="btn-share" class="btn btn-success py-2 fw-bold" onclick="compartilharPDF(event)">
                                📲 ENVIAR PELO WHATSAPP
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function compartilharPDF(event) {
            event.preventDefault();
            const form = document.querySelector('form');
            
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const formData = new FormData(form);
            const btn = document.getElementById('btn-share');
            const textoOriginal = btn.innerHTML;

            try {
                btn.innerHTML = "⏳ GERANDO ARQUIVO...";
                btn.disabled = true;

                const response = await fetch('/gerar', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Falha ao gerar o recibo');

                const blob = await response.blob();
                const numero = formData.get('numero');
                const cliente = formData.get('nome_cliente');
                const valor = formData.get('valor');
                const nomeArquivo = `recibo_loctendas_${numero}.pdf`;
                const file = new File([blob], nomeArquivo, { type: 'application/pdf' });

                // TENTA MODO CELULAR (Compartilhamento nativo)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: 'Recibo Loc Tendas',
                        text: `Segue o recibo nº ${numero} da Loc Tendas.`,
                        files: [file]
                    });
                } 
                // MODO COMPUTADOR (WhatsApp Web)
                else {
                    // 1. Faz o download do arquivo primeiro
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = nomeArquivo;
                    a.click();

                    // 2. Pede o número do cliente
                    let telefone = prompt("Para enviar via WhatsApp Web, digite o número do cliente:\n(Com DDD, apenas números. Ex: 63999999999)\n\nO PDF já foi baixado nas suas Transferências.");

                    if (telefone) {
                        // 3. Monta a mensagem e abre o Zap
                        let texto = `Olá, ${cliente}! Tudo bem?\nSegue em anexo o seu recibo Nº ${numero} no valor de R$ ${valor}.\n\n*Loc Tendas*`;
                        let waUrl = `https://wa.me/55${telefone}?text=${encodeURIComponent(texto)}`;
                        
                        setTimeout(() => {
                            window.open(waUrl, '_blank');
                        }, 500);
                    }
                }

            } catch (error) {
                console.error(error);
                alert("Ocorreu um erro ao gerar o arquivo.");
            } finally {
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
